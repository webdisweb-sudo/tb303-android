plugins {
    id 'com.android.application'
}

android {
    compileSdk 34
    namespace 'com.tb303.app'

    defaultConfig {
        applicationId "com.tb303.app"
        minSdk 21
        targetSdk 34
        versionCode 1
        versionName "1.0"
    }

    buildTypes {
        release {
            minifyEnabled false
            signingConfig signingConfigs.debug
        }
    }

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_1_8
        targetCompatibility JavaVersion.VERSION_1_8
    }
}

dependencies {
    // no external deps needed
}
