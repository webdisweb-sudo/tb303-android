<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<meta name="theme-color" content="#111111">
<title>Roland TB-303</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{
  background:#111;
  display:flex;align-items:center;justify-content:center;
  min-height:100vh;
  font-family:'Arial Narrow',Arial,sans-serif;
  user-select:none;-webkit-user-select:none;
  touch-action:none;
}

/* ═══ CHASSIS ═══════════════════════════════════════════════ */
#tb303{
  width:min(960px,100vw);
  background:linear-gradient(160deg,#d8d8d6 0%,#c2c2be 30%,#b8b8b4 60%,#c4c4c0 100%);
  border-radius:4px;
  box-shadow:
    0 0 0 2px #888,
    0 6px 30px rgba(0,0,0,.8),
    inset 0 1px 0 rgba(255,255,255,.5);
  overflow:hidden;
}

/* ═══ TOP ROW ════════════════════════════════════════════════ */
.top-row{
  display:flex;
  align-items:stretch;
  border-bottom:2px solid #999;
  background:linear-gradient(180deg,#d0d0cc 0%,#bcbcb8 100%);
  min-height:110px;
}

/* Left brand block */
.brand-block{
  padding:12px 18px;
  display:flex;flex-direction:column;justify-content:center;
  border-right:1px solid #aaa;
  min-width:160px;
}
.roland-logo{
  display:flex;align-items:center;gap:6px;
}
.roland-r-svg{
  width:36px;height:36px;
}
.roland-wordmark{
  font-size:22px;font-weight:900;letter-spacing:1px;color:#111;
  font-family:'Arial Black',Arial,sans-serif;
}
.connector-row{
  display:flex;gap:8px;margin-top:8px;align-items:center;
}
.conn-label{
  font-size:7px;font-weight:700;color:#444;letter-spacing:.5px;text-align:center;
}
.conn-jack{
  width:10px;height:10px;border-radius:50%;
  background:radial-gradient(circle at 35% 35%,#888,#333);
  border:1px solid #222;
  margin:0 auto 2px;
}
.conn-led{
  width:6px;height:6px;border-radius:50%;
  background:#600;box-shadow:0 0 2px #600;
  margin:0 auto 2px;
}
.conn-led.red-on{background:#f33;box-shadow:0 0 4px #f33;}

/* Center knob zone */
.knob-zone{
  flex:1;
  display:flex;align-items:center;justify-content:center;
  gap:18px;
  padding:8px 16px;
  border-right:1px solid #aaa;
}

/* Right: Bass Line title */
.bassline-block{
  display:flex;align-items:center;justify-content:flex-end;
  padding:0 24px;
  min-width:200px;
}
.bassline-title{
  font-size:32px;font-weight:300;font-style:italic;
  letter-spacing:2px;color:#111;
  font-family:Georgia,serif;
}

/* ═══ KNOB ════════════════════════════════════════════════════ */
.kw{display:flex;flex-direction:column;align-items:center;gap:3px;}
.kw .klabel{
  font-size:7.5px;font-weight:700;letter-spacing:.6px;color:#333;
  text-align:center;white-space:nowrap;
}
.kw .kval{font-size:7px;color:#555;font-family:monospace;}
.knob{
  width:52px;height:52px;border-radius:50%;
  background:
    radial-gradient(circle at 38% 32%, #686868 0%, #2a2a2a 45%, #111 100%);
  border:2px solid #1a1a1a;
  box-shadow:
    0 4px 10px rgba(0,0,0,.7),
    0 1px 0 rgba(255,255,255,.15) inset,
    0 -1px 0 rgba(0,0,0,.5) inset;
  position:relative;cursor:ns-resize;
}
.knob.sm{width:38px;height:38px;}
.knob-dot{
  position:absolute;top:5px;left:50%;
  width:3px;height:38%;
  background:#e8e8e8;border-radius:2px;
  transform-origin:bottom center;
  transform:translateX(-50%) rotate(0deg);
}
.knob.sm .knob-dot{height:34%;top:4px;}
/* tick marks around knob */
.knob-ring{
  width:60px;height:60px;position:relative;
  display:flex;align-items:center;justify-content:center;
}
.knob-ring.sm{width:46px;height:46px;}
.knob-ring::before,.knob-ring::after{
  content:'';position:absolute;
  border:1px solid #999;border-radius:50%;
  width:58px;height:58px;
  clip-path:polygon(50% 50%, 0 0, 100% 0);
}

/* ═══ MID ROW ════════════════════════════════════════════════ */
.mid-row{
  display:flex;align-items:center;
  border-bottom:2px solid #999;
  background:linear-gradient(180deg,#c8c8c4 0%,#b4b4b0 100%);
  padding:10px 16px;
  gap:20px;
  min-height:90px;
}
.mid-section{display:flex;flex-direction:column;align-items:center;gap:4px;}
.mid-label{font-size:8px;font-weight:700;letter-spacing:.8px;color:#333;}
.mid-sublabel{font-size:7px;color:#555;display:flex;justify-content:space-between;width:50px;}

/* TRACK switch — big chrome lever style */
.track-switch{
  width:60px;height:50px;
  background:linear-gradient(180deg,#ccc 0%,#aaa 100%);
  border:1px solid #888;border-radius:3px;
  position:relative;overflow:hidden;
  box-shadow:0 2px 6px rgba(0,0,0,.4);
}
.track-inner{
  position:absolute;top:4px;left:4px;right:4px;bottom:4px;
  background:linear-gradient(135deg,#b0b0b0,#888);
  border-radius:2px;
  display:flex;align-items:center;justify-content:center;
  font-size:8px;font-weight:700;color:#333;letter-spacing:1px;
}

/* MODE knob — large chrome barrel */
.mode-knob-wrap{
  display:flex;flex-direction:column;align-items:center;gap:4px;
}
.mode-knob{
  width:54px;height:54px;border-radius:50%;
  background:radial-gradient(circle at 40% 35%, #aaa 0%, #777 40%, #555 100%);
  border:2px solid #333;
  box-shadow:0 4px 12px rgba(0,0,0,.6),inset 0 1px 0 rgba(255,255,255,.3);
  position:relative;cursor:pointer;
}
.mode-pointer{
  position:absolute;top:6px;left:50%;
  width:4px;height:40%;
  background:linear-gradient(180deg,#fff,#aaa);
  border-radius:2px;
  transform-origin:bottom center;
  transform:translateX(-50%) rotate(0deg);
}
.mode-labels{font-size:7px;color:#444;text-align:right;line-height:1.8;}

/* PATT GROUP switch */
.patt-group-switch{
  display:flex;gap:3px;
}
.pg-sw{
  width:30px;height:26px;
  background:linear-gradient(180deg,#bbb 0%,#999 100%);
  border:1px solid #777;border-radius:2px;
  font-size:9px;font-weight:700;color:#222;
  cursor:pointer;
  box-shadow:0 2px 4px rgba(0,0,0,.3),inset 0 1px 0 rgba(255,255,255,.4);
  display:flex;align-items:center;justify-content:center;
}
.pg-sw.active{
  background:linear-gradient(180deg,#ccc 0%,#aaa 100%);
  box-shadow:0 1px 2px rgba(0,0,0,.3),inset 0 2px 4px rgba(0,0,0,.3);
}

/* TB-303 label */
.model-block{text-align:center;margin:0 auto;}
.model-num{font-size:28px;font-weight:900;letter-spacing:3px;color:#111;}
.model-sub{font-size:9px;letter-spacing:1px;color:#444;margin-top:2px;}
.model-line{border-top:1px solid #999;margin:3px 0;}

/* ═══ BOT ROW ════════════════════════════════════════════════ */
.bot-row{
  display:flex;
  background:linear-gradient(180deg,#b8b8b4 0%,#a4a4a0 100%);
  padding:8px;
  gap:8px;
  min-height:200px;
}

/* Left column: buttons */
.left-col{
  display:flex;flex-direction:column;gap:5px;
  min-width:88px;
  border:1px solid #999;
  border-radius:3px;
  padding:6px;
  background:linear-gradient(180deg,#b0b0ac 0%,#9c9c98 100%);
}
.sys-btn{
  background:linear-gradient(180deg,#c0c0bc 0%,#a8a8a4 100%);
  border:1px solid #888;border-radius:2px;
  padding:5px 4px;font-size:7.5px;font-weight:700;
  letter-spacing:.4px;color:#111;cursor:pointer;
  box-shadow:0 2px 3px rgba(0,0,0,.3),inset 0 1px 0 rgba(255,255,255,.5);
  text-align:center;
}
.sys-btn:active{box-shadow:inset 0 2px 4px rgba(0,0,0,.4);}
.sys-btn.run-active{
  background:linear-gradient(180deg,#55cc55 0%,#339933 100%);
  color:#fff;border-color:#226622;
}
.sys-btn.write-active{
  background:linear-gradient(180deg,#cc5555 0%,#993333 100%);
  color:#fff;border-color:#662222;
}
.led-row{display:flex;gap:6px;padding:2px 4px;align-items:center;}
.sys-led{
  width:7px;height:7px;border-radius:50%;
  background:#600;box-shadow:0 0 2px #600;
}
.sys-led.on{background:#f33;box-shadow:0 0 6px #f33;}
.small-label{font-size:6.5px;color:#444;font-weight:700;letter-spacing:.4px;}
.dc-bar{display:flex;gap:4px;}
.dc-btn{
  background:linear-gradient(180deg,#bbb,#999);
  border:1px solid #777;border-radius:2px;
  padding:3px 5px;font-size:6.5px;font-weight:700;color:#222;
  cursor:pointer;
  box-shadow:0 1px 3px rgba(0,0,0,.3);
}

/* ═══ PITCH MODE / KEYBOARD ══════════════════════════════════ */
.pitch-block{
  border:1px solid #888;border-radius:3px;
  background:#2a2a2a;
  padding:6px;
  min-width:240px;
}
.pitch-header{
  display:flex;align-items:center;gap:8px;margin-bottom:6px;
}
.pitch-title{font-size:8px;font-weight:700;color:#ccc;letter-spacing:.8px;}
.pitch-led{width:7px;height:7px;border-radius:50%;background:#f33;box-shadow:0 0 5px #f33;}
.fn-btn{
  background:linear-gradient(180deg,#555,#333);
  border:1px solid #222;border-radius:2px;
  padding:4px 8px;font-size:7px;font-weight:700;color:#bbb;
  cursor:pointer;
}

/* Note labels above keyboard */
.note-labels{
  display:flex;
  padding:0 0 3px 0;
  font-size:6.5px;font-weight:700;color:#aaa;
  letter-spacing:.3px;
}

/* Keyboard */
.keyboard{
  position:relative;
  height:70px;
  display:flex;
  background:#111;
  border:1px solid #000;
  border-radius:2px;
  overflow:hidden;
}
.wkey{
  flex:1;
  background:linear-gradient(180deg,#f0f0ee 0%,#ddddd8 100%);
  border-right:1px solid #aaa;
  border-bottom:none;
  border-radius:0 0 3px 3px;
  position:relative;
  cursor:pointer;
  display:flex;flex-direction:column;justify-content:flex-end;align-items:center;
  padding-bottom:5px;
}
.wkey:last-child{border-right:none;}
.wkey:active,.wkey.active-key{
  background:linear-gradient(180deg,#e8d890 0%,#c8b860 100%);
}
.wkey .wled{
  width:7px;height:7px;border-radius:50%;
  background:#700;box-shadow:0 0 2px #700;
}
.wkey.active-key .wled,.wkey:active .wled{background:#f44;box-shadow:0 0 5px #f44;}

/* Black keys overlay */
.black-keys-layer{
  position:absolute;top:0;left:0;right:0;
  height:55%;
  pointer-events:none;
  display:flex;
}
.bkey-spacer{flex:1;}
.bkey{
  width:60%;
  height:100%;
  background:linear-gradient(180deg,#3a3a3a 0%,#111 100%);
  border:1px solid #000;
  border-top:none;
  border-radius:0 0 3px 3px;
  cursor:pointer;
  pointer-events:all;
  position:relative;
  display:flex;flex-direction:column;justify-content:flex-end;align-items:center;
  padding-bottom:4px;
  box-shadow:0 3px 6px rgba(0,0,0,.6);
  flex-shrink:0;
}
.bkey .bled{
  width:5px;height:5px;border-radius:50%;
  background:#700;box-shadow:0 0 2px #700;
}
.bkey.active-key .bled,.bkey:active .bled{background:#f44;box-shadow:0 0 5px #f44;}
.bkey:active,.bkey.active-key{background:linear-gradient(180deg,#6a4a00 0%,#3a2a00 100%);}

/* Note name strip */
.note-strip{
  display:flex;margin-top:3px;
  font-size:6px;font-weight:700;color:#888;
}
.note-strip span{flex:1;text-align:center;}

/* Octave */
.oct-row{display:flex;align-items:center;gap:4px;margin-top:5px;}
.oct-label{font-size:7px;color:#aaa;font-weight:700;}
.oct-btn{
  background:#444;border:1px solid #222;border-radius:2px;
  padding:3px 8px;font-size:8px;color:#aaa;cursor:pointer;
}
.oct-btn.active{background:#8a6a20;border-color:#aa8830;color:#ffe;}

/* ═══ PATTERN + STEPS ════════════════════════════════════════ */
.seq-block{
  flex:1;
  display:flex;flex-direction:column;gap:5px;
  min-width:0;
}

/* Pattern selector row */
.pat-selector-label{font-size:7px;font-weight:700;color:#333;letter-spacing:.8px;margin-bottom:2px;}
.pat-row-wrap{
  background:#333;border:1px solid #555;border-radius:3px;
  padding:5px 6px;
}
.pat-nums{display:flex;gap:3px;margin-bottom:4px;}
.pat-num{
  flex:1;
  background:linear-gradient(180deg,#555 0%,#333 100%);
  border:1px solid #222;border-radius:2px;
  padding:4px 2px;
  font-size:9px;font-weight:700;color:#999;
  text-align:center;cursor:pointer;
  box-shadow:0 1px 3px rgba(0,0,0,.4);
}
.pat-num.active{
  background:linear-gradient(180deg,#ccc 0%,#999 100%);
  color:#111;border-color:#777;
}
.pat-label-row{
  display:flex;gap:3px;
  font-size:6.5px;color:#888;font-weight:700;
}
.pat-label-row span{flex:1;text-align:center;}

/* Step buttons */
.steps-wrap{
  background:#222;border:1px solid #444;border-radius:3px;
  padding:5px 5px 3px;
}
.step-row{
  display:grid;grid-template-columns:repeat(16,1fr);gap:3px;
  margin-bottom:4px;
}
.step{
  background:linear-gradient(180deg,#6a6a66 0%,#484844 100%);
  border:1px solid #2a2a2a;border-radius:2px;
  height:36px;
  cursor:pointer;
  display:flex;flex-direction:column;align-items:center;justify-content:space-between;
  padding:3px 2px;
  font-size:6.5px;color:#888;font-weight:700;
  transition:background .05s;
  position:relative;
}
.step-num{line-height:1;}
.step-led{
  width:6px;height:6px;border-radius:50%;
  background:#600;box-shadow:0 0 2px #600;
}
.step-note{font-size:5.5px;color:#cc9;position:absolute;top:10px;}

.step.on{background:linear-gradient(180deg,#a0a09c 0%,#7c7c78 100%);}
.step.on .step-led{background:#f33;box-shadow:0 0 5px #f33;}
.step.accent-on{background:linear-gradient(180deg,#c8a030 0%,#8a6010 100%);}
.step.accent-on .step-led{background:#ffa;box-shadow:0 0 5px #ffa;}
.step.playing{background:linear-gradient(180deg,#e8d040 0%,#b09000 100%) !important;}
.step.playing .step-led{background:#ff0 !important;box-shadow:0 0 8px #ff0;}

/* Accent / Slide mini buttons */
.sub-row{
  display:grid;grid-template-columns:repeat(16,1fr);gap:3px;
}
.sub-label-row{
  display:flex;align-items:center;gap:4px;margin-bottom:2px;
}
.sub-lbl{font-size:6.5px;font-weight:700;color:#777;min-width:36px;}
.mini-btn{
  height:12px;
  background:#3a3a3a;border:1px solid #222;border-radius:1px;
  cursor:pointer;
}
.mini-btn.accent-on{background:#c8a030;}
.mini-btn.slide-on{background:#3080c0;}

/* ═══ TIME MODE block ════════════════════════════════════════ */
.time-block{
  border:1px solid #888;border-radius:3px;
  background:linear-gradient(180deg,#b0b0ac 0%,#9c9c98 100%);
  padding:6px;
  min-width:130px;
  display:flex;flex-direction:column;gap:5px;
}
.time-title{font-size:8px;font-weight:700;color:#222;letter-spacing:.8px;text-align:center;}
.time-btns{display:flex;gap:4px;justify-content:center;}
.time-btn{
  background:linear-gradient(180deg,#bbb 0%,#999 100%);
  border:1px solid #777;border-radius:2px;
  width:28px;height:24px;
  font-size:11px;cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  box-shadow:0 2px 3px rgba(0,0,0,.3),inset 0 1px 0 rgba(255,255,255,.4);
}
.time-btn.active{background:linear-gradient(180deg,#ccc,#aaa);box-shadow:inset 0 2px 4px rgba(0,0,0,.4);}
.time-lbl{font-size:7px;color:#444;font-weight:700;text-align:center;}
.ts-row{display:flex;gap:4px;justify-content:center;}
.ts-btn{
  background:linear-gradient(180deg,#bbb 0%,#999 100%);
  border:1px solid #777;border-radius:2px;
  padding:4px 8px;font-size:7px;font-weight:700;
  color:#222;cursor:pointer;
  box-shadow:0 2px 3px rgba(0,0,0,.3);
  text-align:center;
}
.ts-btn .ts-led{
  width:6px;height:6px;border-radius:50%;
  background:#700;margin:0 auto 2px;
  box-shadow:0 0 2px #700;
}
.ts-btn.ts-active .ts-led{background:#f33;box-shadow:0 0 5px #f33;}

/* Right write block */
.write-block{
  display:flex;flex-direction:column;gap:5px;
  min-width:70px;
  border:1px solid #888;border-radius:3px;
  padding:6px;
  background:linear-gradient(180deg,#b0b0ac 0%,#9c9c98 100%);
}
.wb-btn{
  background:linear-gradient(180deg,#bbb 0%,#999 100%);
  border:1px solid #777;border-radius:2px;
  padding:6px 4px;font-size:7px;font-weight:700;
  color:#111;cursor:pointer;
  text-align:center;
  box-shadow:0 2px 3px rgba(0,0,0,.3),inset 0 1px 0 rgba(255,255,255,.4);
}
.wb-led{width:7px;height:7px;border-radius:50%;background:#700;box-shadow:0 0 2px #700;margin:0 auto 2px;}
.wb-led.on{background:#f33;box-shadow:0 0 5px #f33;}

/* ═══ RESPONSIVE ══════════════════════════════════════════════ */
@media(max-width:700px){
  .bassline-block,.time-block,.write-block{display:none;}
  .knob{width:38px;height:38px;}
  .wkey{min-width:14px;}
  .step{height:28px;}
}
</style>
</head>
<body>
<div id="tb303"></div>
<script>
(function(){
'use strict';

// ── Audio ────────────────────────────────────────────────────
let ctx=null;
function ac(){
  if(!ctx) ctx=new(window.AudioContext||window.webkitAudioContext)();
  return ctx;
}

// ── State ────────────────────────────────────────────────────
const S={
  wave:'sawtooth', tuning:0, cutoff:4000, resonance:15,
  envMod:0.5, decay:0.3, accent:0.6, tempo:120, volume:0.7,
  running:false, writeMode:false,
  patGroup:1, curPat:0, curOct:0,
  selectedNote:0,  // 0=C..11=B
  patterns:[]
};
const NOTE=['C','C#','D','D#','E','F','F#','G','G#','A','A#','B'];
const BASE_MIDI=36; // C2
function mf(m){return 440*Math.pow(2,(m-69)/12);}

function mkPat(){
  const p=[];for(let i=0;i<16;i++)p.push({on:false,note:0,oct:0,accent:false,slide:false});
  return p;
}
for(let i=0;i<8;i++) S.patterns.push(mkPat());

// ── Sequencer ────────────────────────────────────────────────
let timer=null,nextT=0,si=0;
function tick(){
  const a=ac(), dur=60/S.tempo;
  while(nextT<a.currentTime+0.1){
    sched(nextT,S.patterns[S.curPat],si);
    hlStep(si);
    si=(si+1)%16;
    nextT+=dur;
  }
}
let hlIdx=-1;
function hlStep(i){
  if(hlIdx>=0){const b=document.querySelector(`.step[data-s="${hlIdx}"]`);if(b)b.classList.remove('playing');}
  const b=document.querySelector(`.step[data-s="${i}"]`);if(b)b.classList.add('playing');
  hlIdx=i;
}

function sched(t,pat,idx){
  const s=pat[idx]; if(!s.on) return;
  const a=ac();
  const freq=mf(BASE_MIDI+s.note+s.oct*12+S.tuning);
  const dur=60/S.tempo;
  const gate=s.slide?dur*1.05:dur*0.55;
  const isAcc=s.accent;

  const osc=a.createOscillator(); osc.type=S.wave;
  osc.frequency.setValueAtTime(freq,t);

  const flt=a.createBiquadFilter(); flt.type='lowpass';
  flt.Q.setValueAtTime(S.resonance,t);
  const fc=S.cutoff, depth=fc*S.envMod*(isAcc?1.6:1);
  flt.frequency.setValueAtTime(fc+depth,t);
  flt.frequency.exponentialRampToValueAtTime(Math.max(20,fc*0.2),t+S.decay);

  const vca=a.createGain();
  const pk=S.volume*(isAcc?1+S.accent*0.8:1);
  vca.gain.setValueAtTime(0.001,t);
  vca.gain.linearRampToValueAtTime(pk,t+0.003);
  vca.gain.setValueAtTime(pk,t+gate-0.01);
  vca.gain.linearRampToValueAtTime(0.001,t+gate);

  osc.connect(flt);flt.connect(vca);vca.connect(a.destination);
  osc.start(t);osc.stop(t+gate+0.05);
}

function startSeq(){
  if(S.running)return;
  const a=ac();if(a.state==='suspended')a.resume();
  S.running=true; si=0; nextT=a.currentTime+0.05;
  timer=setInterval(tick,25);
}
function stopSeq(){
  S.running=false;clearInterval(timer);timer=null;
  if(hlIdx>=0){const b=document.querySelector(`.step[data-s="${hlIdx}"]`);if(b)b.classList.remove('playing');}
  hlIdx=-1;
}

function prevNote(freq){
  const a=ac();if(a.state==='suspended')a.resume();
  const o=a.createOscillator();o.type=S.wave;o.frequency.value=freq;
  const f=a.createBiquadFilter();f.type='lowpass';f.frequency.value=S.cutoff;f.Q.value=S.resonance;
  const g=a.createGain();g.gain.setValueAtTime(S.volume,a.currentTime);
  g.gain.linearRampToValueAtTime(0.001,a.currentTime+0.12);
  o.connect(f);f.connect(g);g.connect(a.destination);
  o.start();o.stop(a.currentTime+0.14);
}

// ── Knob ─────────────────────────────────────────────────────
function mkKnob(wrap,{label,min,max,val,dec=1,small=false,onChange}){
  const kw=el('div','kw');
  const lbl=el('div','klabel');lbl.textContent=label;
  const ring=el('div',small?'knob-ring sm':'knob-ring');
  const knob=el('div',small?'knob sm':'knob');
  const dot=el('div','knob-dot');
  knob.appendChild(dot);ring.appendChild(knob);
  const vdisp=el('div','kval');
  kw.appendChild(lbl);kw.appendChild(ring);kw.appendChild(vdisp);
  wrap.appendChild(kw);

  let cur=val,drag=false,startY=0,startV=val;
  function setV(v){
    cur=Math.max(min,Math.min(max,v));
    const ang=-135+((cur-min)/(max-min))*270;
    dot.style.transform=`translateX(-50%) rotate(${ang}deg)`;
    vdisp.textContent=cur.toFixed(dec);
    onChange(cur);
  }
  setV(val);
  const mv=e=>{if(!drag)return;const y=e.touches?e.touches[0].clientY:e.clientY;setV(startV+(startY-y)/150*(max-min));};
  const up=()=>{drag=false;};
  knob.addEventListener('mousedown',e=>{drag=true;startY=e.clientY;startV=cur;e.preventDefault();});
  knob.addEventListener('touchstart',e=>{drag=true;startY=e.touches[0].clientY;startV=cur;},{passive:true});
  window.addEventListener('mousemove',mv);
  window.addEventListener('touchmove',mv,{passive:true});
  window.addEventListener('mouseup',up);
  window.addEventListener('touchend',up);
  return {setV};
}

function el(tag,cls,txt){
  const e=document.createElement(tag);
  if(cls)e.className=cls;
  if(txt!=null)e.textContent=txt;
  return e;
}

// ── Tap tempo ────────────────────────────────────────────────
let tapTimes=[];
function tapTempo(){
  const now=Date.now();
  tapTimes.push(now);
  if(tapTimes.length>4)tapTimes.shift();
  if(tapTimes.length>1){
    const avg=(tapTimes[tapTimes.length-1]-tapTimes[0])/(tapTimes.length-1);
    S.tempo=Math.round(60000/avg);
    // update knob display
    const kvals=document.querySelectorAll('.kval');
    // Tempo knob is the one in mid-section, find by position...
  }
}

// ── Select note on keyboard ───────────────────────────────────
function selectNote(note,keyEl){
  S.selectedNote=note;
  document.querySelectorAll('.wkey,.bkey').forEach(k=>k.classList.remove('active-key'));
  keyEl.classList.add('active-key');
  prevNote(mf(BASE_MIDI+note+S.curOct*12+S.tuning));
}

// ── Step click ────────────────────────────────────────────────
function stepClick(i){
  const s=S.patterns[S.curPat][i];
  if(S.writeMode){
    s.note=S.selectedNote;s.oct=S.curOct;s.on=true;
  } else {
    s.on=!s.on;
  }
  renderSteps();
}

// ── Render steps ─────────────────────────────────────────────
function renderSteps(){
  const pat=S.patterns[S.curPat];
  pat.forEach((s,i)=>{
    const btn=document.querySelector(`.step[data-s="${i}"]`);
    if(!btn)return;
    btn.classList.toggle('on',s.on&&!s.accent);
    btn.classList.toggle('accent-on',s.on&&s.accent);
    const noteLbl=btn.querySelector('.step-note');
    if(noteLbl)noteLbl.textContent=s.on?NOTE[s.note]+(s.oct!==0?(s.oct>0?'+':'')+s.oct:''):'';
    const ab=document.querySelector(`.mini-btn[data-a="${i}"]`);
    if(ab)ab.classList.toggle('accent-on',s.accent);
    const sl=document.querySelector(`.mini-btn[data-sl="${i}"]`);
    if(sl)sl.classList.toggle('slide-on',s.slide);
  });
}

document.addEventListener('DOMContentLoaded',build);
